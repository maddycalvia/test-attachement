  function computeScores(answers){
    const raw={"S":0,"A-ab":0,"A-rj":0,"Ev-e":0,"Ev-i":0,"D":0};
    THEMES.forEach(t=>t.questions.forEach(q=>{raw[q.style]+=(answers[q.id]||0);}));
    const agg={S:raw["S"],A:raw["A-ab"]+raw["A-rj"],Ev:raw["Ev-e"]+raw["Ev-i"],D:raw["D"]};
    const maxPossible={S:40,A:80,Ev:80,D:40};
    const norm={};Object.keys(agg).forEach(k=>{norm[k]=agg[k]/maxPossible[k];});
    const total=Object.values(norm).reduce((a,b)=>a+b,0);
    const pct={};Object.keys(norm).forEach(k=>{pct[k]=total>0?Math.round((norm[k]/total)*100):25;});
    const primary=Object.entries(norm).sort((a,b)=>b[1]-a[1])[0][0];
    const subPct={
      "A-ab":Math.round((raw["A-ab"]/40)*100),
      "A-rj":Math.round((raw["A-rj"]/40)*100),
      "Ev-e":Math.round((raw["Ev-e"]/40)*100),
      "Ev-i":Math.round((raw["Ev-i"]/40)*100),
    };
    return{raw,agg,pct,norm,primary,subPct};
  }

  function computeChildhoodScores(answers){
    const raw={"S":0,"A-ab":0,"A-rj":0,"Ev-e":0,"Ev-i":0,"D":0};
    CHILDHOOD_THEME.questions.forEach(q=>{raw[q.style]+=(answers[q.id]||0);});
    const agg={S:raw["S"],A:raw["A-ab"]+raw["A-rj"],Ev:raw["Ev-e"]+raw["Ev-i"],D:raw["D"]};
    // max possible: S=4q×5=20, A=(3+2)q×5=25, Ev=(2+2)q×5=20, D=3q×5=15
    const maxPossible={S:20,A:25,Ev:20,D:15};
    const norm={};Object.keys(agg).forEach(k=>{norm[k]=agg[k]/maxPossible[k];});
    const total=Object.values(norm).reduce((a,b)=>a+b,0);
    const pct={};Object.keys(norm).forEach(k=>{pct[k]=total>0?Math.round((norm[k]/total)*100):25;});
    const primary=Object.entries(norm).sort((a,b)=>b[1]-a[1])[0][0];
    return{raw,agg,pct,norm,primary};
  }

  function computeDeepInsights(answers, scores, childhoodScores){
    // 1. Score par thème actuel : ratio insécurité (non-S) vs total
    const themeData = THEMES.map((t,i)=>{
      let insecureSum=0, secureSum=0, insecureMax=0, secureMax=0;
      t.questions.forEach(q=>{
        const val=answers[q.id]||0;
        if(q.style==="S"){ secureSum+=val; secureMax+=5; }
        else { insecureSum+=val; insecureMax+=5; }
      });
      const insecureRate = insecureMax>0 ? insecureSum/insecureMax : 0;
      const secureRate   = secureMax>0  ? secureSum/secureMax   : 0;
      // activation = insécurité forte ET sécurité faible
      const activation = insecureRate - secureRate;
      return { index:i, theme:t, insecureRate, secureRate, activation };
    });

    // 2. Thème le plus activé (insécurité la plus forte)
    const hotTheme = [...themeData].sort((a,b)=>b.activation-a.activation)[0];
    // Thème le plus sécure
    const calmTheme = [...themeData].sort((a,b)=>a.activation-b.activation)[0];

    // 3. Cohérence vs situationnel : écart-type des activations
    const activations = themeData.map(t=>t.activation);
    const mean = activations.reduce((a,b)=>a+b,0)/activations.length;
    const variance = activations.reduce((a,b)=>a+(b-mean)**2,0)/activations.length;
    const stdDev = Math.sqrt(variance);
    // stdDev > 0.22 = style très contextuel, < 0.1 = très stable
    const isContextual = stdDev > 0.20;
    const isMixed = stdDev > 0.28;

    // 4. Rapport à soi vs relations (thème index 3 = "attachement à soi")
    const selfTheme = themeData[3];  // index 3
    const relationalAvgActivation = [0,1,2].reduce((a,i)=>a+themeData[i].activation,0)/3;
    const selfVsRelational = selfTheme.activation - relationalAvgActivation;
    // positif = soi plus abîmé que les relations ; négatif = relations plus dures que rapport à soi

    // 5. Travail/argent comme refuge ou terrain miné (thème index 4)
    const workTheme = themeData[4];
    const relationalWorstActivation = Math.max(...[0,1,2].map(i=>themeData[i].activation));
    const workVsRelational = workTheme.activation - relationalAvgActivation;
    // workVsRelational > 0.15 = travail plus insécure que relations → terrain miné
    // workVsRelational < -0.15 = travail plus sécure → refuge possible

    // 6. Tension anxieux/évitant (signature désorganisée cachée)
    const aPct = scores.pct["A"] || 0;
    const evPct = scores.pct["Ev"] || 0;
    const hasHiddenD = scores.primary !== "D" && aPct >= 25 && evPct >= 25;

    return { themeData, hotTheme, calmTheme, stdDev, isContextual, isMixed,
             selfTheme, selfVsRelational, workTheme, workVsRelational,
             hasHiddenD, aPct, evPct };
  }

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                  {Object.values(STYLES).map(s=>(
                    <div key={s.label} style={{padding:"10px 12px",borderRadius:10,background:s.color+"12",border:`1px solid ${s.color}25`,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:16}}>{s.icon}</span>
                      <div style={{fontSize:12,fontWeight:"bold",color:s.color}}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                  {THEMES.map((t,i)=>(
                    <div key={i} style={{padding:"8px 6px",borderRadius:8,background:BG2,textAlign:"center",border:"1px solid #e8ddd4"}}>
                      <div style={{fontSize:16,marginBottom:3}}>{t.icon}</div>
                      <div style={{fontSize:9,color:MID,lineHeight:1.4}}>{t.title}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{background:BG2,borderRadius:12,padding:20,marginBottom:16,border:"1px solid #e8ddd4"}}>
                <div style={{fontSize:13,fontWeight:"bold",color:DARK,marginBottom:14}}>Quelques infos pour personnaliser tes résultats</div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:MID,marginBottom:4,fontWeight:"bold"}}>Prénom</div>
                  <input value={prenom} onChange={e=>setPrenom(e.target.value)} placeholder="Ton prénom..."
                    style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #e0d4c8",background:"#fff",fontSize:14,color:DARK,outline:"none"}}/>
                </div>
                <div>
                  <div style={{fontSize:12,color:MID,marginBottom:4,fontWeight:"bold"}}>Adresse e-mail</div>
                  <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ton@email.com"
                    style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #e0d4c8",background:"#fff",fontSize:14,color:DARK,outline:"none"}}/>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,background:"#f0fdf4",borderRadius:8,padding:"8px 12px"}}>
                    <span>🔒</span>
                    <span style={{fontSize:11,color:"#4CAF50",fontStyle:"italic"}}>Uniquement pour t'envoyer tes résultats. Aucun spam.</span>
                  </div>
                </div>
              </div>

              <div style={{fontSize:12,color:LIGHT,fontStyle:"italic",marginBottom:16,lineHeight:1.7,padding:"10px 14px",background:"#fff",borderRadius:8,border:"1px solid #e8ddd4"}}>
                ℹ️ Réponds spontanément avec ta première impression — il n'y a pas de bonnes ou mauvaises réponses. Le questionnaire prend environ 8–10 minutes.
              </div>
            </div>
          )}

          {isChildhoodStep&&(
            <div className="fade-up" key="childhood">
              <div style={{marginBottom:22,padding:"14px 16px",background:"#fff",borderRadius:10,border:"1px solid #c8e6c930",borderLeft:"4px solid #4CAF50"}}>
                <div style={{fontSize:15,fontWeight:"bold",color:DARK,marginBottom:3}}>{CHILDHOOD_THEME.icon} {CHILDHOOD_THEME.title}</div>
                <div style={{fontSize:12,color:MID,fontStyle:"italic"}}>{CHILDHOOD_THEME.subtitle}</div>
              </div>
              {CHILDHOOD_THEME.questions.map((q,i)=>(
                <LikertQuestion key={q.id} question={q} value={childhoodAnswers[q.id]} onChange={val=>setChildhoodAnswers(a=>({...a,[q.id]:val}))} index={i}/>
              ))}
              {!themeAnswered&&<div style={{fontSize:12,color:"#F57C00",fontStyle:"italic",marginBottom:12}}>⚠️ Réponds à toutes les affirmations pour continuer.</div>}
            </div>
          )}

          {currentTheme&&(
            <div className="fade-up" key={step}>
              <div style={{marginBottom:22,padding:"14px 16px",background:"#fff",borderRadius:10,border:`1px solid ${ACCENT}30`,borderLeft:`4px solid ${ACCENT}`}}>
                <div style={{fontSize:15,fontWeight:"bold",color:DARK,marginBottom:3}}>{currentTheme.icon} {currentTheme.title}</div>
                <div style={{fontSize:12,color:MID,fontStyle:"italic"}}>{currentTheme.subtitle}</div>
              </div>
              {currentTheme.questions.map((q,i)=>(
                <LikertQuestion key={q.id} question={q} value={answers[q.id]} onChange={val=>setAnswers(a=>({...a,[q.id]:val}))} index={i}/>
              ))}
              {!themeAnswered&&<div style={{fontSize:12,color:"#F57C00",fontStyle:"italic",marginBottom:12}}>⚠️ Réponds à toutes les affirmations pour continuer.</div>}
            </div>
          )}

          {step===N+2&&scores&&childhoodScores&&<Results scores={scores} childhoodScores={childhoodScores} answers={answers} prenom={prenom} email={email}/>}

          {step<=N+1&&(
            <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
              {step>0?<button onClick={()=>setStep(s=>s-1)} style={{padding:"12px 24px",borderRadius:24,border:"1.5px solid #e0d4c8",background:"#fff",color:MID,fontSize:14}}>← Retour</button>:<div/>}
              <button onClick={()=>setStep(s=>s+1)} disabled={!themeAnswered&&step>0}
                style={{padding:"12px 28px",borderRadius:24,border:"none",background:(!themeAnswered&&step>0)?"#e0d4c8":ACCENT,color:"#fff",fontSize:14,fontWeight:"bold",opacity:(!themeAnswered&&step>0)?0.6:1,transition:"all 0.2s"}}>
                {step===0?"Commencer →":step===N+1?"Voir mes résultats →":"Continuer →"}
              </button>
            </div>
          )}
          {step===N+2&&(
            <div style={{marginTop:24,textAlign:"center"}}>
              <button onClick={()=>{setStep(0);setAnswers({});setChildhoodAnswers({});}} style={{padding:"12px 28px",borderRadius:24,border:`1.5px solid ${ACCENT}`,background:"transparent",color:ACCENT,fontSize:14}}>
                ↺ Recommencer
              </button>
              <div style={{marginTop:24}}>
                <a href="https://resalib.fr/p/123056" target="_blank" rel="noopener noreferrer"
                  style={{display:"inline-block",padding:"14px 32px",borderRadius:24,background:ACCENT,color:"#fff",fontSize:15,fontWeight:"bold",textDecoration:"none",boxShadow:"0 4px 16px rgba(0,0,0,0.15)"}}>
                  📞 Réserver mon appel découverte gratuit
                </a>
              </div>
            </div>
          )}

        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
